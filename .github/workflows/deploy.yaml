name: Deploy to GitHub Pages
on:
  workflow_run:
    workflows: ["CI Test"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.5'
      - name: Install Dependencies, set up environment, and generate docs
        run: |
          python -m pip install --upgrade pip
          # Install the pinned toolchain first so fastcore/execnb/nbdev versions
          # stay consistent (the previous unpinned git installs pulled
          # incompatible bleeding-edge releases and broke the docs build).
          pip install -r requirements.txt
          pip install -e ".[dev]"
          # Pin Quarto to a known release instead of the moving "latest" URL,
          # which silently broke the docs build when a new version shipped.
          QUARTO_VERSION=1.9.38
          wget -nv "https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VERSION}/quarto-${QUARTO_VERSION}-linux-amd64.deb"
          sudo dpkg -i "quarto-${QUARTO_VERSION}-linux-amd64.deb"
          rm "quarto-${QUARTO_VERSION}-linux-amd64.deb"

          # Export environment variables
          export PLAID_COUNTRY_CODES=US,CA
          export PLAID_PRODUCTS=transactions
          export PLAID_CLIENT_ID=TEST
          export PLAID_SECRET=TEST
          export PLAID_ENV=sandbox
          export POSTGRES_HOST=TEST
          export POSTGRES_USER=TEST
          export POSTGRES_ENCRYPTION_KEY=TEST
          export POSTGRES_PASSWORD=TEST
          export JUPYTER_LAB_TOKEN=TEST
          export QUARTO_CHROMIUM_HEADLESS_MODE=new
          nbdev_docs
          
      - name: Upload static files as artifact
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: _docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.upload.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Build and deploy Pages
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
      - name: Add link to workflow summary
        run: |
          REPO_NAME=${GITHUB_REPOSITORY##*/}
          echo "Site is live [here](https://${{ github.repository_owner }}.github.io/${REPO_NAME}/)" >> $GITHUB_STEP_SUMMARY
